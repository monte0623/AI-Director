<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>
AI Director V10
</title>

<meta
    name="theme-color"
    content="#111827">

<link
    rel="manifest"
    href="manifest.json">

<link
    rel="stylesheet"
    href="css/main.css">

<link
    rel="stylesheet"
    href="css/layout.css">

<link
    rel="stylesheet"
    href="css/project.css">

</head>

<body>

<div id="app">

<!-- ======================================================
HEADER
====================================================== -->

<header class="app-header">

    <div class="header-left">

        <h1>

            AI Director

        </h1>

        <span class="build">

            V10 Build001-B

        </span>

    </div>

    <div class="header-right">

        <button
            id="btnNewProject"
            class="primary-button">

            ＋ 建立製作案

        </button>

    </div>

</header>

<!-- ======================================================
MAIN
====================================================== -->

<main id="workspace">

<!-- ======================================================
Dashboard
====================================================== -->

<section
    id="dashboardPage"
    class="page active">

    <div class="page-header">

        <div>

            <h2>

                案件總覽

            </h2>

            <p>

                Dashboard

            </p>

        </div>

    </div>

    <!-- ==========================
    Filter
    =========================== -->

    <div class="dashboard-filter">

        <button
            class="filter-button active"
            data-filter="all">

            全部

        </button>

        <button
            class="filter-button"
            data-filter="進行中">

            進行中

        </button>

        <button
            class="filter-button"
            data-filter="暫停">

            暫停

        </button>

        <button
            class="filter-button"
            data-filter="已完成">

            已完成

        </button>

        <button
            class="filter-button"
            data-filter="已取消">

            已取消

        </button>

        <button
            class="filter-button"
            data-filter="已封存">

            已封存

        </button>

    </div>

    <!-- ==========================
    Dashboard List
    =========================== -->

    <div
        id="dashboardList"
        class="dashboard-list">

        <div class="empty-card">

            目前尚無製作案

        </div>

    </div>

</section>

<!-- ======================================================
Project Workspace
====================================================== -->

<section
    id="projectWorkspacePage"
    class="page">

    <div class="workspace-header">

        <button
            id="btnBackDashboard"
            class="secondary-button">

            ← 返回案件總覽

        </button>

        <h2
            id="workspaceTitle">

            製作案

        </h2>

    </div>

    <div
        id="workspaceContent">

        <!-- Part 2 -->

    </div>

</section>

</main>

<!-- ======================================================
Create Project Dialog
====================================================== -->

<div
    id="projectDialog"
    class="dialog hidden">

    <div class="dialog-card">

        <h2>

            建立製作案

        </h2>

        <label>

            製作案名稱 *

            <input
                id="projectName"
                type="text">

        </label>

        <label>

            客戶

            <input
                id="clientName"
                type="text">

        </label>

        <label>

            品牌

            <input
                id="brandName"
                type="text">

        </label>

        <label>

            製作說明

            <textarea
                id="projectDescription"
                rows="5"></textarea>

        </label>

        <div class="dialog-buttons">

            <button
                id="btnCancel">

                取消

            </button>

            <button
                id="btnSave"
                class="primary-button">

                儲存

            </button>

        </div>

    </div>

</div>
  
<!-- ======================================================
Project Workspace Content
====================================================== -->

<div class="workspace-grid">

    <!-- ==========================
    Project Information
    =========================== -->

    <section class="workspace-card">

        <div class="card-title">

            製作案資訊

        </div>

        <div class="card-body">

            <div class="info-row">

                <span>製作案名稱</span>

                <input
                    id="workspaceProjectName"
                    type="text">

            </div>

            <div class="info-row">

                <span>客戶</span>

                <input
                    id="workspaceClient"
                    type="text">

            </div>

            <div class="info-row">

                <span>品牌</span>

                <input
                    id="workspaceBrand"
                    type="text">

            </div>

            <div class="info-row">

                <span>狀態</span>

                <select
                    id="workspaceStatus">

                    <option>進行中</option>

                    <option>暫停</option>

                    <option>已完成</option>

                    <option>已取消</option>

                    <option>已封存</option>

                </select>

            </div>

        </div>

    </section>

    <!-- ==========================
    Materials
    =========================== -->

    <section class="workspace-card">

        <div class="card-title">

            製作素材

        </div>

        <div class="card-body">

            <button
                class="primary-button">

                ＋ 新增商品

            </button>

            <button
                class="primary-button">

                ＋ 新增品牌資料

            </button>

            <button
                class="primary-button">

                ＋ 新增 Logo

            </button>

            <button
                class="primary-button">

                ＋ 新增照片

            </button>

        </div>

    </section>

    <!-- ==========================
    Documents
    =========================== -->

    <section class="workspace-card">

        <div class="card-title">

            製作文件

        </div>

        <div class="card-body">

            <button
                class="primary-button">

                ＋ 新增文件

            </button>

        </div>

    </section>

    <!-- ==========================
    Pre Production
    =========================== -->

    <section class="workspace-card">

        <div class="card-title">

            前期企劃

        </div>

        <div class="card-body">

            <textarea
                id="coreMessage"
                rows="3"
                placeholder="想傳達什麼"></textarea>

            <textarea
                id="targetAudience"
                rows="3"
                placeholder="客群"></textarea>

            <textarea
                id="shootingStyle"
                rows="3"
                placeholder="拍攝風格"></textarea>

            <textarea
                id="videoRhythm"
                rows="3"
                placeholder="影片節奏"></textarea>

        </div>

    </section>

    <!-- ==========================
    Production
    =========================== -->

    <section class="workspace-card production-card">

        <div class="card-title">

            製作內容

        </div>

        <div
            id="productionList"
            class="production-list">

            <div class="empty-card">

                尚未建立製作內容

            </div>

        </div>

        <button
            id="btnCreateProduction"
            class="primary-button">

            ＋ 建立製作內容

        </button>

    </section>

</div>

<!-- ======================================================
Scripts
====================================================== -->

</div>

<script
    src="js/storage.js">
</script>

<script
    src="js/router.js">
</script>

<script
    src="js/project/project.js">
</script>

<script
    src="js/app.js">
</script>

</body>

</html>
