<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1,
        viewport-fit=cover">

<title>
    AI Director Assistant V10
</title>

<meta
    name="theme-color"
    content="#111111">

<link
    rel="manifest"
    href="./manifest.json">

<link
    rel="stylesheet"
    href="./css/main.css">

<link
    rel="stylesheet"
    href="./css/ipad.css">

<link
    rel="stylesheet"
    href="./css/mobile.css">

</head>

<body>

    <!-- Splash -->

    <div id="app-splash">

        <div class="logo">

            AI Director

        </div>

        <div class="version">

            V10 Foundation-R1

        </div>

    </div>

    <!-- Root -->

    <div id="app-root">

        <!-- iPad/Desktop -->

        <div
            id="ipadWorkspace"
            class="workspace-root ipad-mode">
        </div>

        <!-- Mobile -->

        <div
            id="mobileWorkspace"
            class="workspace-root mobile-mode">
        </div>

    </div>

    <!-- ================================================= -->
    <!-- Core -->
    <!-- ================================================= -->

    <script src="./js/event-bus.js"></script>

    <script src="./js/model/domain-base.js"></script>

    <script src="./js/model/project.js"></script>

    <script src="./js/model/scene.js"></script>

    <script src="./js/model/shot.js"></script>

    <script src="./js/model/sequence.js"></script>

    <script src="./js/project-store.js"></script>

    <!-- ================================================= -->
    <!-- Workspace Core -->
    <!-- ================================================= -->

    <script src="./js/workspace/workspace-state.js"></script>

    <script src="./js/workspace/workspace-lifecycle.js"></script>

    <script src="./js/workspace/workspace-registry.js"></script>

    <!-- ================================================= -->
    <!-- iPad -->
    <!-- ================================================= -->

    <script src="./js/ipad/fixed-workspace-engine.js"></script>

    <script src="./js/ipad/workspace-layout.js"></script>

    <script src="./js/ipad/workspace-focus.js"></script>

    <!-- ================================================= -->
    <!-- Mobile -->
    <!-- ================================================= -->

    <script src="./js/mobile/progressive-engine.js"></script>

    <script src="./js/mobile/snap-engine.js"></script>

    <script src="./js/mobile/ratio-engine.js"></script>

    <!-- ================================================= -->
    <!-- Workspace UI -->
    <!-- ================================================= -->

    <script src="./js/workspace/script.js"></script>

    <script src="./js/workspace/scene.js"></script>

    <script src="./js/workspace/shot.js"></script>

    <script src="./js/workspace/detail.js"></script>

    <script src="./js/workspace/storyboard.js"></script>

    <script src="./js/workspace/shooting.js"></script>

    <!-- ================================================= -->
    <!-- App -->
    <!-- ================================================= -->

    <script src="./js/app.js"></script>

</body>

</html>
