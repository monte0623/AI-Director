<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AI Director V10</title>

    <meta
        name="theme-color"
        content="#111827">

    <link
        rel="manifest"
        href="manifest.json">

    <link
        rel="stylesheet"
        href="css/main.css">

    <link
        rel="stylesheet"
        href="css/layout.css">

    <link
        rel="stylesheet"
        href="css/project.css">

</head>

<body>

    <!-- ==========================
         App
    =========================== -->

    <div id="app">

        <!-- Header -->

        <header class="app-header">

            <h1>
                AI Director
            </h1>

            <div class="build-version">

                V10
                Build001-A

            </div>

        </header>

        <!-- Main -->

        <main
            id="workspace"
            class="workspace">

            <!-- 首頁 -->

            <section
                id="projectHome"
                class="page active">

                <div class="page-title">

                    製作案

                </div>

                <button
                    id="btnNewProject"
                    class="primary-button">

                    ＋ 建立製作案

                </button>

                <div
                    id="projectList"
                    class="project-list">

                    <div class="empty-card">

                        目前尚無製作案

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- Dialog -->

    <div
        id="projectDialog"
        class="dialog hidden">

        <div class="dialog-card">

            <h2>

                建立製作案

            </h2>

            <label>

                製作案名稱 *

                <input
                    id="projectName"
                    type="text"
                    placeholder="請輸入製作案名稱">

            </label>

            <label>

                客戶

                <input
                    id="clientName"
                    type="text"
                    placeholder="例如：可口可樂">

            </label>

            <label>

                品牌

                <input
                    id="brandName"
                    type="text"
                    placeholder="例如：Coca-Cola">

            </label>

            <label>

                製作說明

                <textarea
                    id="projectDescription"
                    rows="5"
                    placeholder="請輸入製作說明"></textarea>

            </label>

            <div class="dialog-buttons">

                <button
                    id="btnCancel">

                    取消

                </button>

                <button
                    id="btnSave"
                    class="primary-button">

                    儲存

                </button>

            </div>

        </div>

    </div>

    <!-- Scripts -->

    <script src="js/storage.js"></script>

    <script src="js/router.js"></script>

    <script src="js/project/project.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
